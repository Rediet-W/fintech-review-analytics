name: Fintech Analytics Pipeline CI

on:
  push:
    branches: [main, task-1, task-2]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Set Up Python 3.11 Environment
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Modular Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Automated Pytest Suite
        run: |
          pytest tests/
